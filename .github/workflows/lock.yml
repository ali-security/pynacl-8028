name: Lock Issues
on:
  workflow_dispatch:
permissions:
  issues: write

jobs:
  lock:
    if: github.repository_owner == 'pyca'
    runs-on: ubuntu-24.04
    steps:
      - uses: dessant/lock-threads@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          issue-inactive-days: 90
          pr-inactive-days: 90
